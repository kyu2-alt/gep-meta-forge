name: EvoMap GEP Sandbox Validation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-mutation:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run GEP Sandbox Test
      run: |
        python sandbox_test.py
        
    - name: Test Deterministic Mutation Pipeline
      run: |
        python forge.py --a genomes/parent_a_sniper.py --b genomes/parent_b_arbitrage.py --out ci_hybrid_test.py
        python ci_hybrid_test.py
